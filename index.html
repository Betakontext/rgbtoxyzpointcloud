<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pixel Point Cloud</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>

</head>
<body>


    <script src="/three/three.min.js"></script> 
    <!-- Alternative CDN for OrbitControls -->
    <script src="/three/OrbitControls.js"></script> 

    <script>
        // 1. Set up the scene, camera, and renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Load JSON data (pixel colors)
        fetch('/lists/Schilf_Druck_pixel_colors.json')  // Replace with your actual JSON file path
            .then(response => response.json())
            .then(data => {
                const points = new THREE.BufferGeometry();
                const vertices = [];
                const colors = [];

                // 3. Loop through the pixel colors and create points
                data.forEach((color, index) => {
                    const r = color[0] / 255;  // Normalize to 0-1
                    const g = color[1] / 255;
                    const b = color[2] / 255;

                    // Create ()random) positions for the points (simulating 3D space)
                    const x = ((color[0] / 255) * 500 - 125) + (Math.random() - 0.5) * 10; // * 500 - 250;  // Shift the range to be centered around 0 (for X-axis)
                    const y = ((color[1] / 255) * 500 - 125) + (Math.random() - 0.5) * 10; // * 500 - 250;  // Same for Y-axis
                    const z = ((color[2] / 255) * 500 - 125) + (Math.random() - 0.5) * 10; // * 500 - 250;  // Same for Z-axis

                    vertices.push(x, y, z);
                    colors.push(r, g, b);
                });

                points.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                points.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

                const material = new THREE.PointsMaterial({ size: 0.5, vertexColors: true });
                const pointCloud = new THREE.Points(points, material);
                scene.add(pointCloud);

                // 4. Set up the camera position
                camera.position.set(0, 0, 500);

                // 5. Initialize OrbitControls
                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableZoom = true;  // Enable zooming with the mouse wheel
                controls.enablePan = true;   // Enable panning with the mouse
                controls.enableRotate = true; // Enable rotation

                // 6. Animation loop (rotation)
                const animate = function () {
                    requestAnimationFrame(animate);

                    // Rotate the point cloud for better visualization
                    pointCloud.rotation.x += 0.001;
                    pointCloud.rotation.y += 0.001;

                    controls.update(); // Update controls for smooth interaction

                    renderer.render(scene, camera);
                };

                animate();
            })
            .catch(error => console.error('Error loading JSON:', error));
    </script>
</body>
</html>
